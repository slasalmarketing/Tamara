<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamara Fee Calculator</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f172a, #111827);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    direction: rtl;
    color: #fff;
}

.card {
    width: 420px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 18px;
    padding: 25px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}

.box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 12px;
    text-align: center;
}

.box h4 {
    margin: 0;
    font-size: 13px;
    color: #94a3b8;
}

.box p {
    margin: 8px 0 0;
    font-size: 18px;
    font-weight: bold;
}

.highlight {
    border: 1px solid #fbbf24;
    background: rgba(251,191,36,0.1);
}
</style>
</head>

<body>

<div class="card">
    <h2>💰 Tamara Fee Calculator</h2>

    <input type="number" id="amount" placeholder="قيمة الطلب">

    <button onclick="calc()">احسب الآن</button>

    <div class="grid">

        <div class="box">
            <h4>الحساب</h4>
            <p id="percent">0</p>
        </div>

        <div class="box highlight">
            <h4>رسوم ثابتة ⭐</h4>
            <p id="fixed">1.50</p>
        </div>

        <div class="box">
            <h4>الضريبة</h4>
            <p id="tax">0</p>
        </div>

        <div class="box">
            <h4>إجمالي الرسوم</h4>
            <p id="totalFees">0</p>
        </div>

        <div class="box" style="grid-column: span 2;">
            <h4>السعر النهائي</h4>
            <p id="final">0</p>
        </div>

    </div>
</div>

<script>
function calc() {
    let A = parseFloat(document.getElementById("amount").value);

    if (!A || A <= 0) return;

    const percent = 0.07;
    const fixed = 1.5;
    const taxRate = 0.15;

    let percentFee = percent * A;
    let fee = percentFee + fixed;
    let tax = fee * taxRate;
    let totalFees = fee + tax;
    let final = A + totalFees;

    document.getElementById("percent").innerText = percentFee.toFixed(2);
    document.getElementById("fixed").innerText = fixed.toFixed(2);
    document.getElementById("tax").innerText = tax.toFixed(2);
    document.getElementById("totalFees").innerText = totalFees.toFixed(2);
    document.getElementById("final").innerText = final.toFixed(2);
}
</script>

</body>
